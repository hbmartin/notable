# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"

    # Strictly limit to 2 PRs. 
    # Usually: one for Onyx, one for "The rest of the world."
    open-pull-requests-limit: 2

    # GLOBAL RULE: Allow patches AND minor feature updates.
    # This blocks Major (v1 to v2) breaking changes.
    allow:
      - dependency-name: "*"
        update-types: 
          - "version-update:semver-patch"
          - "version-update:semver-minor"

    ignore:
      # These remain fully manual.
      - dependency-name: "org.jetbrains.kotlin*"
      - dependency-name: "com.android.tools.build:*"
      - dependency-name: "com.google.devtools.ksp*"
      - dependency-name: "org.lsposed.hiddenapibypass:*"

    groups:
      # Group A: Onyx SDK
      # All Onyx updates (Patch or Minor) in one bucket.
      onyx-sdk:
        patterns:
          - "com.onyx.android.sdk:*"

      # Group B: The "Safe" Catch-All
      # This pulls every other allowed update into a single second PR.
      general-updates:
        patterns:
          - "*"
        exclude-patterns:
          - "com.onyx.android.sdk:*"
          - "at.yawk.lz4.*"
