name: PR Database Tests
# Room schema/migration changes are the highest data-loss risk in the app, so
# instrumented tests run automatically when a PR touches database-critical
# paths (the full suite is still available on demand via the
# 'run-android-tests' label — see pr-android-tests.yml).
permissions:
  contents: read

# A newer push to the same PR supersedes any still-running emulator check.
concurrency:
  group: pr-db-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches: ["dev", "main"]
    types: [opened, synchronize, reopened]
    paths:
      - "app/schemas/**"
      - "app/src/main/java/com/ethran/notable/data/db/**"
      - "app/src/androidTest/java/com/ethran/notable/data/db/**"
      - "app/src/androidTest/java/com/ethran/notable/db/**"

jobs:
  db-tests:
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a

      - name: Run DB Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: true
          emulator-options: >-
            -no-window
            -no-snapshot-save
            -noaudio
            -no-boot-anim
            -camera-back none
          disable-animations: true
          emulator-boot-timeout: 600
          # Migration tests live in com.ethran.notable.db and DB edge-case tests
          # in com.ethran.notable.data.db; the runner's package filter takes only
          # one prefix, so run the full suite rather than silently skipping one.
          script: ./gradlew connectedDebugAndroidTest
