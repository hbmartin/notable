name: Build and Release Version

on:
  workflow_dispatch:
  
permissions:
  contents: write

env:
  MAVEN_OPTS: >-
    -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          # cache: gradle

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 9.1.0

      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.2.4
        with:
          fileDir: "./secrets"
          fileName: "my.keystore"
          encodedString: ${{ secrets.KEYSTORE_FILE }}

      - name: Execute Gradle build
        env:
          STORE_FILE: ${{ github.workspace }}/secrets/my.keystore
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          SHIPBOOK_APP_ID: ${{ secrets.SHIPBOOK_APP_ID }}
          SHIPBOOK_APP_KEY: ${{ secrets.SHIPBOOK_APP_KEY }}
        run: |
          ./gradlew assembleRelease \
            -PSTORE_FILE="$STORE_FILE" \
            -PSTORE_PASSWORD="$STORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_PASSWORD="$KEY_PASSWORD"

      #   - name: Cache Gradle packages
      #     uses: actions/cache@v1
      #     with:
      #         path: ~/.gradle/caches
      #         key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
      #         restore-keys: ${{ runner.os }}-gradle

      - name: Verify APK Files
        run: find ${{ github.workspace }}/app/build/outputs/apk/ -name "*.apk"

      - name: Retrieve Version
        env:
          STORE_FILE: ${{ github.workspace }}/secrets/my.keystore
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          SHIPBOOK_APP_ID: ${{ secrets.SHIPBOOK_APP_ID }}
          SHIPBOOK_APP_KEY: ${{ secrets.SHIPBOOK_APP_KEY }}
        run: |
          ./gradlew -q printVersionName
          VERSION_NAME=$(./gradlew -q printVersionName)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        id: android_version


      - name: Rename APKs
        run: |
          cd ${{ github.workspace }}/app/build/outputs/apk/release
          mv app-universal-release.apk notable-${{ env.VERSION_NAME }}.apk
          mv app-arm64-v8a-release.apk notable-${{ env.VERSION_NAME }}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk notable-${{ env.VERSION_NAME }}-armeabi-v7a.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/app/build/outputs/apk/release/notable-*.apk
          tag_name: v${{ env.VERSION_NAME }}
          token: ${{ secrets.TOKEN }}
